spring.application.name=backend

# 数据库连接配置（本机运行使用localhost）
spring.datasource.url=jdbc:postgresql://localhost:5432/project_management
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.example.backend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

# 服务器配置
server.port=8080

# JWT配置
jwt.secret=my-super-secret-key-for-jwt-token-signing-please-use-long-enough-string-at-least-256-bits
jwt.expiration=86400000

# 智谱AI配置
langchain4j.zhipu.api-key=635dcc8632034607ac10426542c991f5.4biUondwITYglFFV
langchain4j.zhipu.model=glm-4-plus

# 缓存配置（Redis）
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# Redis配置（本机运行使用localhost）
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=10000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
